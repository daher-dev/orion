4\"><\u002Fcircle>\n        <circle cx=\"50\" cy=\"26\" r=\"1.5\"><\u002Fcircle>\n      <\u002Fg>\n      <!-- belt stars (blue) -->\n      <g fill=\"#a83227\">\n        <circle cx=\"40\" cy=\"56\" r=\"2.4\"><\u002Fcircle>\n        <circle cx=\"50\" cy=\"58\" r=\"2.7\"><\u002Fcircle>\n        <circle cx=\"60\" cy=\"56\" r=\"2.4\"><\u002Fcircle>\n      <\u002Fg>\n\n      <!-- Annotations -->\n      <!-- Annotation 1: top — neckline / collar stars -->\n      <g font-family=\"JetBrains Mono, monospace\" font-size=\"3.4\" fill=\"#7a7160\">\n        <line x1=\"50\" y1=\"14\" x2=\"50\" y2=\"3\" stroke=\"#7a7160\" stroke-width=\"0.3\"><\u002Fline>\n        <circle cx=\"50\" cy=\"14\" r=\"0.7\" fill=\"#7a7160\"><\u002Fcircle>\n        <text x=\"50\" y=\"1.5\" text-anchor=\"middle\" fill=\"#1f1b15\" font-weight=\"600\">01 — Collar (3 stars)<\u002Ftext>\n      <\u002Fg>\n      <!-- Annotation 2: left sleeve -->\n      <g font-family=\"JetBrains Mono, monospace\" font-size=\"3.4\" fill=\"#7a7160\">\n        <line x1=\"6\" y1=\"43\" x2=\"-4\" y2=\"55\" stroke=\"#7a7160\" stroke-width=\"0.3\"><\u002Fline>\n        <text x=\"-8\" y=\"58\" fill=\"#1f1b15\" font-weight=\"600\">02 — Sleeve apex<\u002Ftext>\n      <\u002Fg>\n      <!-- Annotation 3: belt center -->\n      <g font-family=\"JetBrains Mono, monospace\" font-size=\"3.4\" fill=\"#7a7160\">\n        <line x1=\"65\" y1=\"58\" x2=\"78\" y2=\"68\" stroke=\"#a83227\" stroke-width=\"0.3\"><\u002Fline>\n        <text x=\"80\" y=\"69.6\" fill=\"#a83227\" font-weight=\"600\">03 — Orion's belt<\u002Ftext>\n        <text x=\"80\" y=\"74.6\" fill=\"#7a7160\">Mintaka · Alnilam · Alnitak<\u002Ftext>\n      <\u002Fg>\n      <!-- Annotation 4: hem -->\n      <g font-family=\"JetBrains Mono, monospace\" font-size=\"3.4\" fill=\"#7a7160\">\n        <line x1=\"28\" y1=\"86\" x2=\"20\" y2=\"100\" stroke=\"#7a7160\" stroke-width=\"0.3\"><\u002Fline>\n        <text x=\"18\" y=\"103\" fill=\"#1f1b15\" font-weight=\"600\">04 — Hem corners<\u002Ftext>\n      <\u002Fg>\n      <!-- Annotation 5: sleeve right -->\n      <g font-family=\"JetBrains Mono, monospace\" font-size=\"3.4\" fill=\"#7a7160\">\n        <line x1=\"94\" y1=\"43\" x2=\"104\" y2=\"36\" stroke=\"#7a7160\" stroke-width=\"0.3\"><\u002Fline>\n        <text x=\"106\" y=\"37\" fill=\"#1f1b15\" font-weight=\"600\">05 — Connecting lines<\u002Ftext>\n        <text x=\"106\" y=\"41\" fill=\"#7a7160\">0.9 stroke @ 50% opacity<\u002Ftext>\n      <\u002Fg>\n    <\u002Fsymbol>\n\n    <!-- Linear gradient used by the rainbow don't, scoped so it doesn't pollute -->\n    <linearGradient id=\"dont-rainbow-stroke\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">\n      <stop offset=\"0%\" stop-color=\"#ef4444\"><\u002Fstop>\n      <stop offset=\"25%\" stop-color=\"#eab308\"><\u002Fstop>\n      <stop offset=\"50%\" stop-color=\"#22c55e\"><\u002Fstop>\n      <stop offset=\"75%\" stop-color=\"#06b6d4\"><\u002Fstop>\n      <stop offset=\"100%\" stop-color=\"#7e5bef\"><\u002Fstop>\n    <\u002FlinearGradient>\n  <\u002Fdefs>\n<\u002Fsvg>\n\n<main class=\"bs-shell\">\n\n  <!-- ═════════ Top bar ═════════ -->\n  <div class=\"bs-top\">\n    <div class=\"bs-top-l\">\n      <span class=\"bs-top-mark\">\n        <svg width=\"32\" height=\"32\" viewBox=\"0 0 100 105\" style=\"overflow: visible;\">\n          <use href=\"#orion-display\"><\u002Fuse>\n        <\u002Fsvg>\n      <\u002Fspan>\n      <div>\n        <div class=\"bs-top-eyebrow\">Orion · Brand<\u002Fdiv>\n        <div class=\"bs-top-title\">Brand sheet<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"bs-top-meta\">\n      v1.0 · maio 2026<br>\n      Confidencial · uso interno\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ═════════ 01 — Hero ═════════ -->\n  <section class=\"bs-sec\" style=\"margin-top: 0;\">\n    <div class=\"bs-sec-head\">\n      <div class=\"bs-sec-num\"><em>01<\u002Fem>Conceito<\u002Fdiv>\n      <div>\n        <h2 class=\"bs-sec-title\">Uma camiseta desenhada com <em>estrelas<\u002Fem>.<\u002Fh2>\n        <p class=\"bs-sec-sub\">O símbolo da Orion é uma silhueta de camiseta cujos vértices são estrelas, com o cinturão de Órion atravessando o peito. É o nosso produto — software para quem faz roupa — desenhado pelo céu noturno que dá nome à empresa.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hero\">\n      <div class=\"hero-mark-stage\">\n        <span class=\"hero-corner-tl\"><\u002Fspan>\n        <span class=\"hero-corner-tr\"><\u002Fspan>\n        <span class=\"hero-corner-bl\"><\u002Fspan>\n        <span class=\"hero-corner-br\"><\u002Fspan>\n        <div class=\"hero-mark\">\n          <span class=\"mark-glyph\">\n            <svg width=\"220\" height=\"231\" viewBox=\"0 0 100 105\" style=\"overflow: visible;\">\n              <use href=\"#orion-display\"><\u002Fuse>\n            <\u002Fsvg>\n          <\u002Fspan>\n          <span class=\"wordmark wordmark-lg\">Or<span class=\"wm-i\">i<span class=\"wm-belt-l\" aria-hidden=\"true\"><\u002Fspan><span class=\"wm-belt-r\" aria-hidden=\"true\"><\u002Fspan><\u002Fspan>on<\u002Fspan>\n          <span class=\"hero-tagline\">SaaS para confecção<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <aside class=\"hero-side\">\n        <div class=\"hero-side-card\">\n          <h3>O nome<\u002Fh3>\n          <p><em>Órion<\u002Fem> — o caçador na mitologia grega, a constelação mais reconhecível do hemisfério sul. Visível das oficinas do interior à passarela em Milão. Universal e nosso.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"hero-side-card\">\n          <h3>O símbolo<\u002Fh3>\n          <p>O cinturão de Órion — três estrelas em linha — vira o emblema no peito da camiseta. Onze estrelas adicionais marcam os vértices da silhueta: gola, ombros, mangas, axilas, barra.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"hero-side-card\">\n          <h3>O tom<\u002Fh3>\n          <p>Papel quente do atelier, tinta do céu noturno, brilho do algodão cru. Artesanal sem ser nostálgico; técnico sem ser frio.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Faside>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 02 — Anatomy ═════════ -->\n  <section class=\"bs-sec\">\n    <div class=\"bs-sec-head\">\n      <div class=\"bs-sec-num\"><em>02<\u002Fem>Anatomia<\u002Fdiv>\n      <div>\n        <h2 class=\"bs-sec-title\">14 estrelas, uma <em>silhueta<\u002Fem>.<\u002Fh2>\n        <p class=\"bs-sec-sub\">Onze estrelas formam o contorno da camiseta. Três — o cinturão de Órion — atravessam o peito como detalhe central. As linhas de conexão ficam em 50% de opacidade, deixando as estrelas como protagonistas.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"anatomy\">\n      <div class=\"anatomy-stage\">\n        <svg class=\"diagram\" viewBox=\"-10 -8 120 125\" style=\"overflow: visible;\">\n          <use href=\"#orion-anatomy\"><\u002Fuse>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"anatomy-notes\">\n        <div class=\"anatomy-note\">\n          <div class=\"anatomy-note-num\">01<\u002Fdiv>\n          <div>\n            <div class=\"anatomy-note-title\">Colarinho — 3 estrelas<\u002Fdiv>\n            <div class=\"anatomy-note-body\">Esquerda, direita e o vértice da gola em \"V\" rasa. Triangulam o topo da silhueta.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anatomy-note\">\n          <div class=\"anatomy-note-num\">02<\u002Fdiv>\n          <div>\n            <div class=\"anatomy-note-title\">Ombros, mangas, axilas<\u002Fdiv>\n            <div class=\"anatomy-note-body\">Seis estrelas marcam a estrutura da peça. As das mangas são menores; as dos ombros são as maiores do contorno.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anatomy-note\">\n          <div class=\"anatomy-note-num\">03<\u002Fdiv>\n          <div>\n            <div class=\"anatomy-note-title\">Cinturão — sempre em azul Noite<\u002Fdiv>\n            <div class=\"anatomy-note-body\">Mintaka, Alnilam e Alnitak. Em uso colorido o cinturão é o único elemento em Ember — destaca o emblema do peito. Em mono, fica na mesma cor da silhueta.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anatomy-note\">\n          <div class=\"anatomy-note-num\">04<\u002Fdiv>\n          <div>\n            <div class=\"anatomy-note-title\">Barra — 2 estrelas grandes<\u002Fdiv>\n            <div class=\"anatomy-note-body\">Ancoram a composição. Mesma escala visual das estrelas dos ombros — equilíbrio entre topo e base.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anatomy-note\">\n          <div class=\"anatomy-note-num\">05<\u002Fdiv>\n          <div>\n            <div class=\"anatomy-note-title\">Linhas de conexão<\u002Fdiv>\n            <div class=\"anatomy-note-body\">Stroke 0.9 sobre viewBox 100. Opacidade 50% para o contorno, 70% para o cinturão. Pontas arredondadas (<code>linecap: round<\u002Fcode>).<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 03 — Mark system ═════════ -->\n  <section class=\"bs-sec\">\n    <div class=\"bs-sec-head\">\n      <div class=\"bs-sec-num\"><em>03<\u002Fem>Sistema<\u002Fdiv>\n      <div>\n        <h2 class=\"bs-sec-title\">Três variantes, <em>uma marca<\u002Fem>.<\u002Fh2>\n        <p class=\"bs-sec-sub\">A constelação inteira só sobrevive a partir de 56px. Abaixo disso, trocamos para a silhueta sólida com o cinturão recortado — robusta até 16px de favicon. O cinturão isolado é a última instância antes de não usar a marca.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mark-system\">\n      <!-- Tier 1 -->\n      <div class=\"mark-tier\">\n        <div class=\"mark-tier-stage\">\n          <svg width=\"148\" height=\"155\" viewBox=\"0 0 100 105\" style=\"overflow: visible;\">\n            <use href=\"#orion-display\"><\u002Fuse>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"mark-tier-body\">\n          <div class=\"mark-tier-eyebrow\"><span class=\"tier-num\">A<\u002Fspan>Marca de exibição<\u002Fdiv>\n          <div class=\"mark-tier-name\">Constelação completa<\u002Fdiv>\n          <p class=\"mark-tier-desc\">A versão \"rica\" — 14 estrelas com halos, linhas de conexão sutis e o cinturão destacado. Hero do site, capa de slides, peça impressa, embalagem.<\u002Fp>\n          <span class=\"mark-tier-range\">≥ 56px · vetor preferível<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Tier 2 -->\n      <div class=\"mark-tier\">\n        <div class=\"mark-tier-stage dark\">\n          <svg width=\"124\" height=\"130\" viewBox=\"0 0 100 105\" style=\"overflow: visible; color: var(--star);\">\n            <use href=\"#orion-solid\"><\u002Fuse>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"mark-tier-body\">\n          <div class=\"mark-tier-eyebrow\"><span class=\"tier-num\">B<\u002Fspan>Marca de aplicativo<\u002Fdiv>\n          <div class=\"mark-tier-name\">Silhueta sólida<\u002Fdiv>\n          <p class=\"mark-tier-desc\">A camiseta vira uma forma cheia; só o cinturão aparece, em recorte. É a versão que aguenta o ícone do app, o avatar no sidebar e o favicon sem perder identidade.<\u002Fp>\n          <span class=\"mark-tier-range\">16px – 56px · UI, app icons<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Tier 3 -->\n      <div class=\"mark-tier\">\n        <div class=\"mark-tier-stage\">\n          <svg class=\"belt-loader\" width=\"144\" height=\"48\" viewBox=\"0 0 30 10\" style=\"overflow: visible;\" aria-label=\"Indicador de carregamento Orion\">\n            <circle cx=\"5\" cy=\"5\" r=\"3\"><\u002Fcircle>\n            <circle cx=\"15\" cy=\"5\" r=\"3.6\"><\u002Fcircle>\n            <circle cx=\"25\" cy=\"5\" r=\"3\"><\u002Fcircle>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"mark-tier-body\">\n          <div class=\"mark-tier-eyebrow\"><span class=\"tier-num\">C<\u002Fspan>Cinturão animado<\u002Fdiv>\n          <div class=\"mark-tier-name\">Três estrelas — e o loading<\u002Fdiv>\n          <p class=\"mark-tier-desc\">As três estrelas isoladas são também o indicador de carregamento da Orion. Pulsam em sequência da esquerda para direita — mesma cadência do cinturão piscando no céu. Usado em splash, botões ocupados, sincronização.<\u002Fp>\n          <span class=\"mark-tier-range\">loading state · sempre com wordmark se for 1ª aparição<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 04 — Wordmark + lockups ═════════ -->\n  <section class=\"bs-sec\">\n    <div class=\"bs-sec-head\">\n      <div class=\"bs-sec-num\"><em>04<\u002Fem>Wordmark &amp; lockups<\u002Fdiv>\n      <div>\n        <h2 class=\"bs-sec-title\">O <em>i<\u002Fem> com cinturão.<\u002Fh2>\n        <p class=\"bs-sec-sub\">\"Orion\" em Fraunces 400, tracking −0.028em. O ponto natural do <em>i<\u002Fem> não some — ele vira a estrela central de Alnilam. Dois pontos menores flanqueiam, formando o cinturão em mini. Detalhe pequeno, mas presente sempre que o wordmark aparece com peso de marca.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"lockups\">\n\n      <!-- Horizontal -->\n      <div class=\"lockup l-horizontal\">\n        <span class=\"lockup-label\">A — Horizontal<\u002Fspan>\n        <div class=\"lk-h\">\n          <span class=\"glyph\">\n            <svg width=\"84\" height=\"88\" viewBox=\"0 0 100 105\" style=\"overflow: visible;\">\n              <use href=\"#orion-display\"><\u002Fuse>\n            <\u002Fsvg>\n          <\u002Fspan>\n          <span class=\"wordmark wordmark-lg\">Or<span class=\"wm-i\">i<span class=\"wm-belt-l\" aria-hidden=\"true\"><\u002Fspan><span class=\"wm-belt-r\" aria-hidden=\"true\"><\u002Fspan><\u002Fspan>on<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Stacked -->\n      <div class=\"lockup l-stacked\">\n        <span class=\"lockup-label\">B — Empilhado<\u002Fspan>\n        <div class=\"lk-stacked\">\n          <span class=\"glyph\">\n            <svg width=\"90\" height=\"95\" viewBox=\"0 0 100 105\" style=\"overflow: visible;\">\n              <use href=\"#orion-display\"><\u002Fuse>\n            <\u002Fsvg>\n          <\u002Fspan>\n          <span class=\"wordmark wordmark-md\">Or<span class=\"wm-i\">i<span class=\"wm-belt-l\" aria-hidden=\"true\"><\u002Fspan><span class=\"wm-belt-r\" aria-hidden=\"true\"><\u002Fspan><\u002Fspan>on<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Icon only -->\n      <div class=\"lockup l-icon\">\n        <span class=\"lockup-label\">C — Só símbolo<\u002Fspan>\n        <span class=\"glyph\">\n          <svg width=\"120\" height=\"126\" viewBox=\"0 0 100 105\" style=\"overflow: visible;\">\n            <use href=\"#orion-display\"><\u002Fuse>\n          <\u002Fsvg>\n        <\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- Wordmark only -->\n      <div class=\"lockup l-wordmark\">\n        <span class=\"lockup-label\">D — Só wordmark<\u002Fspan>\n        <span class=\"wordmark wordmark-lg\" style=\"color: var(--ink);\">Or<span class=\"wm-i\">i<span class=\"wm-belt-l\" aria-hidden=\"true\"><\u002Fspan><span class=\"wm-belt-r\" aria-hidden=\"true\"><\u002Fspan><\u002Fspan>on<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- With tagline -->\n      <div class=\"lockup l-tagline\">\n        <span class=\"lockup-label\">E — Com tagline<\u002Fspan>\n        <div class=\"lk-tag\">\n          <span class=\"wordmark wordmark-md\">Or<span class=\"wm-i\">i<span class=\"wm-belt-l\" aria-hidden=\"true\"><\u002Fspan><span class=\"wm-belt-r\" aria-hidden=\"true\"><\u002Fspan><\u002Fspan>on<\u002Fspan>\n          <span class=\"tag-rule\"><\u002Fspan>\n          <span class=\"tag-text\">SaaS para confecção<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 05 — Clear space + size ═════════ -->\n  <section class=\"bs-sec\">\n    <div class=\"bs-sec-head\">\n      <div class=\"bs-sec-num\"><em>05<\u002Fem>Espaço &amp; escala<\u002Fdiv>\n      <div>\n        <h2 class=\"bs-sec-title\">Respeite o <em>x<\u002Fem>. Não desça do 16.<\u002Fh2>\n        <p class=\"bs-sec-sub\">A unidade de espaçamento <code>x<\u002Fcode> é a altura de uma estrela do ombro (≈ 1/8 da altura do símbolo). Nada toca a marca dentro desse perímetro. Mínimo absoluto: 16px na variante B (sólida); 56px na variante A (constelação).<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"clearance\">\n      <div class=\"clear-stage\">\n        <div class=\"clear-grid\">\n          <span class=\"glyph\">\n            <svg width=\"180\" height=\"189\" viewBox=\"0 0 100 105\" style=\"overflow: visible;\">\n              <use href=\"#orion-display\"><\u002Fuse>\n            <\u002Fsvg>\n          <\u002Fspan>\n          <span class=\"xunit xunit-t\">↕ x<\u002Fspan>\n          <span class=\"xunit xunit-r\">↔ x<\u002Fspan>\n          <span class=\"xunit xunit-b\">↕ x<\u002Fspan>\n          <span class=\"xunit xunit-l\">↔ x<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"clear-explain\">\n        <dl class=\"bs-spec\">\n          <dt>x =<\u002Fdt>\n          <dd>Altura da estrela do ombro · ≈ <code>0.125 × altura do símbolo<\u002Fcode><\u002Fdd>\n          <dt>Min A<\u002Fdt>\n          <dd>Constelação completa · <code>56px<\u002Fcode> de altura no digital · <code>20mm<\u002Fcode> no impresso<\u002Fdd>\n          <dt>Min B<\u002Fdt>\n          <dd>Silhueta sólida · <code>16px<\u002Fcode> no digital · <code>8mm<\u002Fcode> no impresso<\u002Fdd>\n          <dt>Min C<\u002Fdt>\n          <dd>Cinturão isolado · qualquer tamanho, sempre acompanhado do wordmark<\u002Fdd>\n          <dt>Wordmark<\u002Fdt>\n          <dd>Mínimo <code>14px<\u002Fcode>. Abaixo disso o diacrítico some — use só \"Orion\" em Fraunces<\u002Fdd>\n        <\u002Fdl>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"size-ramp\">\n      <div class=\"size-cell\">\n        <span class=\"sz-tier\">A · 96<\u002Fspan>\n        <span class=\"sz-glyph\">\n          <svg width=\"92\" height=\"96\" viewBox=\"0 0 100 105\" style=\"overflow: visible;\">\n            <use href=\"#orion-display\"><\u002Fuse>\n          <\u002Fsvg>\n        <\u002Fspan>\n        <span class=\"sz-px\">96px<\u002Fspan>\n        <span class=\"sz-note\">Hero, capa<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"size-cell\">\n        <span class=\"sz-tier\">A · 64<\u002Fspan>\n        <span class=\"sz-glyph\">\n          <svg width=\"60\" height=\"63\" viewBox=\"0 0 100 105\" style=\"overflow: visible;\">\n            <use href=\"#orion-display\"><\u002Fuse>\n          <\u002Fsvg>\n        <\u002Fspan>\n        <span class=\"sz-px\">64px<\u002Fspan>\n        <span class=\"sz-note\">Marketing<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"size-cell\">\n        <span class=\"sz-tier\">B · 40<\u002Fspan>\n        <span class=\"sz-glyph\">\n          <svg width=\"38\" height=\"40\" viewBox=\"0 0 100 105\" style=\"overflow: visible;\">\n            <use href=\"#orion-solid\"><\u002Fuse>\n          <\u002Fsvg>\n        <\u002Fspan>\n        <span class=\"sz-px\">40px<\u002Fspan>\n        <span class=\"sz-note\">Card, avatar<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"size-cell\">\n        <span class=\"sz-tier\">B · 24<\u002Fspan>\n        <span class=\"sz-glyph\">\n          <svg width=\"22\" height=\"24\" viewBox=\"0 0 100 105\" style=\"overflow: visible;\">\n            <use href=\"#orion-solid\"><\u002Fuse>\n          <\u002Fsvg>\n        <\u002Fspan>\n        <span class=\"sz-px\">24px<\u002Fspan>\n        <span class=\"sz-note\">Sidebar, header<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"size-cell\">\n        <span class=\"sz-tier\">B · 16<\u002Fspan>\n        <span class=\"sz-glyph\">\n          <svg width=\"15\" height=\"16\" viewBox=\"0 0 100 105\" style=\"overflow: visible;\">\n            <use href=\"#orion-solid\"><\u002Fuse>\n          <\u002Fsvg>\n        <\u002Fspan>\n        <span class=\"sz-px\">16px<\u002Fspan>\n        <span class=\"sz-note\">Favicon — limite<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"size-cell bad\">\n        <span class=\"sz-tier\">A · 24<\u002Fspan>\n        <span class=\"sz-glyph\">\n          <svg width=\"22\" height=\"24\" viewBox=\"0 0 100 105\" style=\"overflow: visible;\">\n            <use href=\"#orion-display\"><\u002Fuse>\n          <\u002Fsvg>\n        <\u002Fspan>\n        <span class=\"sz-px\">24px<\u002Fspan>\n        <span class=\"sz-note\">Não use A&nbsp;aqui<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ 06 — Color ═════════ -->\n  <section class=\"bs-sec\">\n    <div class=\"bs-sec-head\">\n      <div class=\"bs-sec-num\"><em>06<\u002Fem>Cor<\u002Fdiv>\n      <div>\n        <h2 class=\"bs-sec-title\">Papel quente, <em>brasa de Betelgeuse<\u002Fem>, brilho do algodão.<\u002Fh2>\n        <p class=\"bs-sec-sub\">Betelgeuse é a supergigante vermelha no ombro de Órion — a estrela mais quente da constelação, em cor. A paleta da Orion vive nesse calor: papéis e tintas terrosas do atelier, brasa de cinta de cobre, brilho do algodão cru. Sem azuis frios na marca-mãe.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Core palette -->\n    <div class=\"color-grid\">\n      <div class=\"swatch\">\n        <div class=\"swatch-chip\" style=\"background: #f5f0e8;\"><\u002Fdiv>\n        <div class=\"swatch-body\">\n          <div class=\"swatch-name\">Paper<\u002Fdiv>\n          <div class=\"swatch-hex\">#F5F0E8<\u002Fdiv>\n          <div class=\"swatch-role\">Fundo principal<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"swatch\">\n        <div class=\"swatch-chip\" style=\"background: #fbf8f2;\"><\u002Fdiv>\n        <div class=\"swatch-body\">\n          <div class=\"swatch-name\">Surface<\u002Fdiv>\n          <div class=\"swatch-hex\">#FBF8F2<\u002Fdiv>\n          <div class=\"swatch-role\">Cards, painéis<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"swatch\">\n        <div class=\"swatch-chip\" style=\"background: #efe9dd;\"><\u002Fdiv>\n        <div class=\"swatch-body\">\n          <div class=\"swatch-name\">Surface-2<\u002Fdiv>\n          <div class=\"swatch-hex\">#EFE9DD<\u002Fdiv>\n          <div class=\"swatch-role\">Estados, divisores quentes<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"swatch\">\n        <div class=\"swatch-chip\" style=\"background: #1f1b15;\"><\u002Fdiv>\n        <div class=\"swatch-body\">\n          <div class=\"swatch-name\">Ink<\u002Fdiv>\n          <div class=\"swatch-hex\">#1F1B15<\u002Fdiv>\n          <div class=\"swatch-role\">Texto primário, marca mono<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"swatch\">\n        <div class=\"swatch-chip\" style=\"background: #a83227;\"><\u002Fdiv>\n        <div class=\"swatch-body\">\n          <div class=\"swatch-name\">Ember<\u002Fdiv>\n          <div class=\"swatch-hex\">#A83227<\u002Fdiv>\n          <div class=\"swatch-role\">Brasa de Betelgeuse, accent<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"swatch\">\n        <div class=\"swatch-chip\" style=\"background: #f5efe0;\"><\u002Fdiv>\n        <div class=\"swatch-body\">\n          <div class=\"swatch-name\">Star<\u002Fdiv>\n          <div class=\"swatch-hex\">#F5EFE0<\u002Fdiv>\n          <div class=\"swatch-role\">Estrelas sobre fundo escuro<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Three approved pairings -->\n    <div class=\"color-band\">\n      <div class=\"color-pairing\">\n        <span class=\"glyph\">\n          <svg width=\"64\" height=\"67\" viewBox=\"0 0 100 105\" style=\"overflow: visible; color: var(--ink);\">\n            <use href=\"#orion-display\"><\u002Fuse>\n          <\u002Fsvg>\n        <\u002Fspan>\n        <div>\n          <div class=\"cp-name\">Ink sobre Paper · primário<\u002Fdiv>\n          <div class=\"cp-desc\">Combinação padrão. 13.4:1 de contraste. 95% das aparições da marca.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"color-pairing dark\">\n        <span class=\"glyph\">\n          <svg width=\"64\" height=\"67\" viewBox=\"0 0 100 105\" style=\"overflow: visible; color: var(--star);\">\n            <use href=\"#orion-display\"><\u002Fuse>\n          <\u002Fsvg>\n        <\u002Fspan>\n        <div>\n          <div class=\"cp-name\">Star sobre Carvão · escuro<\u002Fdiv>\n          <div class=\"cp-desc\">Modo escuro, app icon, capas. O cinturão sobe para Ember; o resto da marca fica em Star.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Sub-product hues -->\n    <h3 style=\"font-family: var(--font-display); font-size: 16px; font-weight: 500; margin: 36px 0 4px; letter-spacing: -0.01em;\">Famílias de produto<\u002Fh3>\n    <p style=\"font-size: 13px; color: var(--ink-3); margin: 0 0 12px; max-width: 60ch;\">Cada módulo herda uma cor de identidade. Elas só aparecem dentro do produto — nunca tocam o símbolo principal da Orion.<\u002Fp>\n    <div class=\"subs\">\n      <div class=\"sub-card\">\n        <div class=\"sub-mark-row\">\n          <span class=\"sub-mark-square\" style=\"background: #c2410c;\">\n            <i data-lucide=\"trending-up\" style=\"width: 14px; height: 14px;\"><\u002Fi>\n          <\u002Fspan>\n          <span class=\"sub-mark-name\">Vendas<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"sub-card-hex\">#C2410C — terracota<\u002Fdiv>\n        <div class=\"sub-card-meta\">\n          <span class=\"sub-card-icon-name\">lucide · trending-up<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sub-card\">\n        <div class=\"sub-mark-row\">\n          <span class=\"sub-mark-square\" style=\"background: #7e5bef;\">\n            <i data-lucide=\"shirt\" style=\"width: 14px; height: 14px;\"><\u002Fi>\n          <\u002Fspan>\n          <span class=\"sub-mark-name\">Catálogo<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"sub-card-hex\">#7E5BEF — beringela<\u002Fdiv>\n        <div class=\"sub-card-meta\">\n          <span class=\"sub-card-icon-name\">lucide · shirt<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sub-card\">\n        <div class=\"sub-mark-row\">\n          <span class=\"sub-mark-square\" style=\"background: #0f766e;\">\n            <i data-lucide=\"scissors\" style=\"width: 14px; height: 14px;\"><\u002Fi>\n          <\u002Fspan>\n          <span class=\"sub-mark-name\">Produção<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"sub-card-hex\">#0F766E — verde-azulado<\u002Fdiv>\n        <div class=\"sub-card-meta\">\n          <span class=\"sub-card-icon-name\">lucide · scissors<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sub-card\">\n        <div class=\"sub-mark-row\">\n          <span class=\"sub-mark-square\" style=\"background: #b45309;\">\n            <i data-lucide=\"package\" style=\"width: 14px; height: 14px;\"><\u002Fi>\n          <\u002Fspan>\n          <span class=\"sub-mark-name\">Estoque<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"sub-card-hex\">#B45309 — âmbar<\u002Fdiv>\n        <div class=\"sub-card-meta\">\n          <span class=\"sub-card-icon-name\">lucide · package<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sub-card\">\n        <div class=\"sub-mark-row\">\n          <span class=\"sub-mark-square\" style=\"background: #1e40af;\">\n            <i data-lucide=\"bar-chart-3\" style=\"width: 14px; height: 14px;\"><\u002Fi>\n          <\u002Fspan>\n          <span class=\"sub-mark-name\">Relatórios<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"sub-card-hex\">#1E40AF — azul profundo<\u002Fdiv>\n        <div class=\"sub-card-meta\">\n          <span class=\"sub-card-icon-name
