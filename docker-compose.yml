services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: orion
      POSTGRES_DB: orion_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orion -d orion_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
