name: E2E CI

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/e2e-ci.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/e2e-ci.yml"

concurrency:
  group: e2e-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: orion
          POSTGRES_PASSWORD: orion
          POSTGRES_DB: orion_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U orion -d orion_e2e"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      ENV: dev
      DATABASE_URL: postgresql://orion:orion@localhost:5432/orion_e2e
      FIREBASE_PROJECT_ID: orion-e2e
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_DEV_BYPASS_AUTH: "true"
      NEXT_PUBLIC_DEV_BYPASS_UID: qa-dev-user

    steps:
      - uses: actions/checkout@v6

      # --- Backend setup ---
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --all-extras --dev

      - name: Run migrations
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Start backend
        working-directory: backend
        run: |
          uv run uvicorn main:app --host 0.0.0.0 --port 8000 \
            --app-dir src > ../backend.log 2>&1 &
          echo $! > ../backend.pid

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8000/healthcheck > /dev/null; then
              echo "Backend ready"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start"
          cat backend.log
          exit 1

      # The e2e specs assume `qa-dev-user` is a provisioned admin (they create
      # their own per-test data via the API). Login is invite-only with no
      # self-signup, so the founding admin is seeded directly here.
      - name: Provision dev-bypass user (qa-dev-user)
        working-directory: backend
        run: uv run python scripts/bootstrap_admin.py
        env:
          BOOTSTRAP_FIREBASE_UID: qa-dev-user
          BOOTSTRAP_EMAIL: qa-dev@orion.local
          BOOTSTRAP_NAME: QA Dev User
          BOOTSTRAP_COMPANY_NAME: QA E2E
          BOOTSTRAP_SUBDOMAIN: qae2e

      # --- Frontend setup ---
      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend.log
          retention-days: 7

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" || true
          fi
