name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - "scripts/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "scripts/**"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

  typecheck:
    name: Type check (ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: ty check
        run: uv run ty check src

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: orion
          POSTGRES_PASSWORD: orion
          POSTGRES_DB: orion_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U orion -d orion_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      ENV: test
      DATABASE_URL: postgresql://orion:orion@localhost:5432/orion_test
      FIREBASE_PROJECT_ID: orion-test

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run pytest
        run: uv run pytest

  deploy:
    name: Deploy to Cloud Run
    needs: [lint, typecheck, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/backend:${{ github.sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push image
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies (for Alembic)
        run: uv sync

      - name: Run database migrations (Neon)
        run: |
          DATABASE_URL="$(gcloud secrets versions access latest --secret=orion-database-url)" \
            uv run alembic upgrade head

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy orion-backend \
            --image "$IMAGE" \
            --region "${{ vars.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --service-account "orion-runtime@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --set-env-vars "^##^ENV=prd##LOG_LEVEL=INFO##FIREBASE_PROJECT_ID=${{ vars.GCP_PROJECT_ID }}##ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}" \
            --set-secrets "DATABASE_URL=orion-database-url:latest,ANTHROPIC_API_KEY=orion-anthropic-key:latest"
