  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

0;\n  font-display: swap;\n  src: url(\"219be48c-c89b-416e-9031-f07068787431\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"fbba7aec-8364-4cfc-a526-e49d7381b5b9\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"a2cc20c1-40f3-4b16-9069-0f04bf9a0c38\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"41c96fb7-d51e-4cd6-8fa6-f049ca7a677d\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"1ec3ec31-31db-480f-8ba8-a49ccc2c77bc\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"3ec77a81-0ed2-47e6-a92d-ce057a7ca6a2\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* Orion design tokens + base styles */\n\n:root {\n  /* Brand surfaces — warm, characterful, soft palette */\n  --bg:        #f5f0e8;          /* page bg, paper warm */\n  --surface:   #fbf8f2;          /* card surface */\n  --surface-2: #efe9dd;          /* hover/raised */\n  --line:      #e3dbcb;          /* divider */\n  --line-soft: #ece5d4;\n  --ink:       #1f1b15;          /* primary text */\n  --ink-2:     #4a4337;          /* secondary text */\n  --ink-3:     #7a7160;          /* muted text */\n  --ink-inv:   #fbf8f2;\n\n  /* Accent — user customizable. default is indigo-blue per accent option 2 */\n  --accent:        #2563eb;\n  --accent-soft:   color-mix(in oklab, var(--accent) 14%, var(--surface));\n  --accent-ink:    #ffffff;\n  --accent-edge:   color-mix(in oklab, var(--accent) 30%, var(--ink));\n\n  /* Sub-product identities — each section has its own color/icon */\n  --brand-sales:    #c2410c;     /* terracotta — Vendas */\n  --brand-catalog:  #7e5bef;     /* aubergine — Catálogo */\n  --brand-prod:     #0f766e;     /* teal — Produção */\n  --brand-inv:      #b45309;     /* amber — Estoque */\n  --brand-reports:  #1e40af;     /* deep blue — Relatórios */\n  --brand-settings: #44403c;     /* stone — Ajustes */\n\n  /* Status colors */\n  --ok:    #15803d;\n  --warn:  #b45309;\n  --err:   #b91c1c;\n  --info:  #1e40af;\n  --ok-bg:    color-mix(in oklab, var(--ok)   12%, var(--surface));\n  --warn-bg:  color-mix(in oklab, var(--warn) 12%, var(--surface));\n  --err-bg:   color-mix(in oklab, var(--err)  12%, var(--surface));\n  --info-bg:  color-mix(in oklab, var(--info) 12%, var(--surface));\n\n  /* Sizing */\n  --radius:    10px;\n  --radius-sm: 6px;\n  --radius-lg: 14px;\n  --shadow-sm: 0 1px 2px rgba(31,27,21,.04), 0 1px 0 rgba(31,27,21,.03);\n  --shadow:    0 1px 2px rgba(31,27,21,.05), 0 6px 18px -8px rgba(31,27,21,.10);\n  --shadow-lg: 0 4px 8px rgba(31,27,21,.06), 0 24px 48px -12px rgba(31,27,21,.18);\n\n  --sb-w: 256px;\n  --sb-w-collapsed: 68px;\n  --tb-h: 56px;\n\n  /* Typography */\n  --font-display: \"Fraunces\", \"Source Serif 4\", Georgia, serif;\n  --font-body:    \"Inter Tight\", \"Inter\", system-ui, -apple-system, sans-serif;\n  --font-mono:    \"JetBrains Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n}\n\n* { box-sizing: border-box; }\nhtml, body, #root { margin: 0; padding: 0; height: 100%; }\nbody {\n  font-family: var(--font-body);\n  font-size: 14px;\n  color: var(--ink);\n  background: var(--bg);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\nbutton { font: inherit; color: inherit; }\na { color: inherit; text-decoration: none; }\nh1,h2,h3,h4,h5 { margin: 0; font-family: var(--font-display); font-weight: 500; letter-spacing: -0.01em; }\n\n/* ───────── Layout ───────── */\n.app {\n  display: grid;\n  grid-template-columns: var(--sb-w) 1fr;\n  grid-template-rows: var(--tb-h) 1fr;\n  grid-template-areas: \"sb tb\" \"sb main\";\n  height: 100vh;\n  overflow: hidden;\n}\n.app.collapsed { grid-template-columns: var(--sb-w-collapsed) 1fr; }\n\n.sidebar {\n  grid-area: sb;\n  background: linear-gradient(180deg, #1c1812 0%, #221d15 100%);\n  color: #d9d2c2;\n  display: flex;\n  flex-direction: column;\n  border-right: 1px solid #15110b;\n  overflow: hidden;\n}\n.sb-brand {\n  display: flex; align-items: center; gap: 10px;\n  padding: 14px 16px;\n  border-bottom: 1px solid rgba(255,255,255,.05);\n  height: var(--tb-h);\n  flex-shrink: 0;\n}\n.sb-co-picker { cursor: default; transition: background .15s; }\n.sb-co-picker:hover { background: rgba(255,255,255,.04); }\n.sb-brand-mark {\n  width: 32px; height: 32px;\n  border-radius: 8px;\n  background: var(--accent);\n  color: var(--accent-ink);\n  display: grid; place-items: center;\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: 17px;\n  flex-shrink: 0;\n  box-shadow: 0 0 0 1px rgba(255,255,255,.1) inset, 0 4px 12px -4px var(--accent);\n}\n.sb-brand-name {\n  font-family: var(--font-display);\n  font-size: 17px;\n  color: #f5efe0;\n  font-weight: 500;\n  letter-spacing: -0.01em;\n  line-height: 1;\n}\n.sb-brand-sub {\n  font-size: 10.5px;\n  color: rgba(245,239,224,.6);\n  letter-spacing: 0.06em;\n  font-style: italic;\n  font-family: var(--font-display, Georgia, serif);\n  line-height: 1;\n  margin-top: 4px;\n  display: inline-flex; align-items: center; gap: 5px;\n}\n.sb-brand-sub svg { color: var(--accent, #c66a2c); flex-shrink: 0; }\n\n.sb-scroll {\n  flex: 1;\n  overflow-y: auto;\n  padding: 12px 10px;\n  scrollbar-width: thin;\n  scrollbar-color: rgba(255,255,255,.1) transparent;\n}\n.sb-section {\n  font-size: 10.5px;\n  color: rgba(217,210,194,.42);\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  padding: 14px 10px 6px;\n  font-weight: 600;\n}\n.sb-item {\n  display: flex; align-items: center; gap: 10px;\n  padding: 8px 10px;\n  margin: 1px 0;\n  border-radius: var(--radius-sm);\n  color: rgba(217,210,194,.85);\n  cursor: default;\n  font-size: 13.5px;\n  border: 1px solid transparent;\n  position: relative;\n}\n.sb-item:hover { background: rgba(255,255,255,.04); color: #f5efe0; }\n.sb-item.active {\n  background: rgba(255,255,255,.06);\n  color: #f5efe0;\n  border-color: rgba(255,255,255,.06);\n}\n.sb-item.active::before {\n  content: '';\n  position: absolute; left: -10px; top: 6px; bottom: 6px;\n  width: 3px; border-radius: 0 3px 3px 0;\n  background: var(--sub-color, var(--accent));\n}\n.sb-item .sb-dot {\n  width: 8px; height: 8px; border-radius: 2px;\n  background: var(--sub-color, currentColor);\n  opacity: .6;\n}\n.sb-item .sb-count {\n  margin-left: auto;\n  font-size: 11px;\n  font-variant-numeric: tabular-nums;\n  background: rgba(255,255,255,.06);\n  padding: 1px 6px; border-radius: 999px;\n  color: rgba(245,239,224,.7);\n}\n\n.sb-foot {\n  border-top: 1px solid rgba(255,255,255,.05);\n  padding: 12px;\n  display: flex; align-items: center; gap: 10px;\n}\n.sb-foot-name { font-size: 12.5px; color: #f5efe0; line-height: 1.2; }\n.sb-foot-role { font-size: 10.5px; color: rgba(217,210,194,.55); margin-top: 2px; letter-spacing: .04em; text-transform: uppercase; }\n.sb-bell {\n  position: relative;\n  width: 32px; height: 32px;\n  display: grid; place-items: center;\n  border-radius: 8px;\n  background: transparent;\n  border: 1px solid transparent;\n  color: rgba(245,239,224,.7);\n  cursor: pointer;\n  flex-shrink: 0;\n  transition: background .15s, color .15s, border-color .15s;\n}\n.sb-bell:hover { background: rgba(255,255,255,.06); color: #f5efe0; border-color: rgba(255,255,255,.08); }\n.sb-bell-badge {\n  position: absolute; top: 3px; right: 3px;\n  min-width: 14px; height: 14px;\n  padding: 0 4px;\n  display: grid; place-items: center;\n  background: var(--accent, #c66a2c);\n  color: #fff;\n  border-radius: 999px;\n  font-size: 10px; font-weight: 600;\n  font-family: var(--font-mono);\n  line-height: 1;\n}\n.app.collapsed .sb-bell { display: none; }\n\n.app.collapsed .sb-brand-name,\n.app.collapsed .sb-brand-sub,\n.app.collapsed .sb-section,\n.app.collapsed .sb-item span:not(.sb-dot):not(.sb-count),\n.app.collapsed .sb-foot-meta,\n.app.collapsed .sb-foot-name,\n.app.collapsed .sb-foot-role,\n.app.collapsed .sb-item .sb-count { display: none; }\n.app.collapsed .sb-item { justify-content: center; padding: 9px 0; }\n.app.collapsed .sb-foot { justify-content: center; }\n\n/* ───────── Topbar ───────── */\n.topbar {\n  grid-area: tb;\n  background: var(--surface);\n  border-bottom: 1px solid var(--line);\n  display: flex; align-items: center;\n  padding: 0 18px;\n  gap: 14px;\n  height: var(--tb-h);\n}\n.tb-burger {\n  width: 32px; height: 32px;\n  display: grid; place-items: center;\n  border-radius: var(--radius-sm);\n  background: transparent;\n  border: 0;\n  color: var(--ink-2);\n}\n.tb-burger:hover { background: var(--surface-2); color: var(--ink); }\n\n.tb-search {\n  flex: 1; max-width: 520px;\n  display: flex; align-items: center; gap: 8px;\n  background: var(--bg);\n  border: 1px solid var(--line);\n  padding: 7px 12px;\n  border-radius: var(--radius);\n  color: var(--ink-3);\n  cursor: text;\n}\n.tb-search:hover { border-color: color-mix(in oklab, var(--accent) 30%, var(--line)); }\n.tb-search kbd {\n  font-family: var(--font-mono); font-size: 10.5px;\n  background: var(--surface);\n  border: 1px solid var(--line);\n  padding: 1px 5px; border-radius: 4px;\n  color: var(--ink-3);\n  margin-left: auto;\n}\n\n.tb-spacer { flex: 1; }\n.tb-actions { display: flex; align-items: center; gap: 6px; }\n.tb-icon-btn {\n  width: 34px; height: 34px;\n  display: grid; place-items: center;\n  border: 0; background: transparent;\n  border-radius: var(--radius-sm);\n  color: var(--ink-2);\n  position: relative;\n}\n.tb-icon-btn:hover { background: var(--surface-2); color: var(--ink); }\n.tb-badge {\n  position: absolute; top: 4px; right: 4px;\n  min-width: 14px; height: 14px;\n  padding: 0 3px;\n  background: var(--brand-sales);\n  color: white;\n  border-radius: 999px;\n  font-size: 9.5px; font-weight: 600;\n  display: grid; place-items: center;\n  border: 1.5px solid var(--surface);\n}\n\n.tb-co {\n  display: flex; align-items: center; gap: 10px;\n  padding: 4px 10px 4px 4px;\n  border-radius: 999px;\n  border: 1px solid var(--line);\n  background: var(--bg);\n}\n.tb-co:hover { background: var(--surface); }\n.tb-co-mark {\n  width: 26px; height: 26px;\n  border-radius: 999px;\n  display: grid; place-items: center;\n  background: var(--accent);\n  color: var(--accent-ink);\n  font-family: var(--font-display);\n  font-weight: 600; font-size: 13px;\n}\n.tb-co-name { font-size: 12.5px; font-weight: 500; line-height: 1; }\n.tb-co-sub { font-size: 10px; color: var(--ink-3); margin-top: 2px; line-height: 1; letter-spacing: .03em; }\n\n.tb-avatar {\n  width: 32px; height: 32px;\n  border-radius: 999px;\n  background: var(--ink);\n  color: var(--ink-inv);\n  display: grid; place-items: center;\n  font-weight: 600; font-size: 12px;\n  font-family: var(--font-display);\n}\n\n/* ───────  border-radius: 18px;\n  display: grid;\n  place-items: center;\n  position: relative;\n  overflow: hidden;\n  min-height: 220px;\n}\n.bs-stage.night {\n  background: #1c1812;\n  border-color: #1c1812;\n  color: var(--star);\n}\n.bs-stage.paper { background: var(--bg); border-color: var(--line); }\n.bs-stage.surface-2 { background: var(--surface-2); }\n.bs-stage-label {\n  position: absolute;\n  bottom: 12px; left: 14px;\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n}\n.bs-stage.night .bs-stage-label { color: rgba(245,239,224,.55); }\n.bs-stage-meta {\n  position: absolute;\n  bottom: 12px; right: 14px;\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  letter-spacing: 0.04em;\n  color: var(--ink-3);\n}\n.bs-stage.night .bs-stage-meta { color: rgba(245,239,224,.55); }\n\n/* Labelled spec */\n.bs-spec {\n  display: grid;\n  grid-template-columns: 90px 1fr;\n  gap: 12px 18px;\n  font-size: 13px;\n  color: var(--ink-2);\n}\n.bs-spec dt {\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  padding-top: 2px;\n}\n.bs-spec dd { margin: 0; }\n.bs-spec dd code {\n  font-family: var(--font-mono);\n  font-size: 11.5px;\n  background: var(--surface-2);\n  padding: 1px 6px;\n  border-radius: 4px;\n  color: var(--ink);\n}\n\n/* ─────────── 01 — Hero / Display mark ─────────── */\n.hero {\n  display: grid;\n  grid-template-columns: 1fr 360px;\n  gap: 28px;\n  align-items: stretch;\n}\n.hero-mark-stage {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: 18px;\n  position: relative;\n  overflow: hidden;\n  min-height: 480px;\n  display: grid;\n  place-items: center;\n}\n.hero-mark-stage::after {\n  content: '';\n  position: absolute; inset: 0;\n  background:\n    radial-gradient(closest-side at 50% 48%,\n      color-mix(in oklab, var(--ember) 14%, transparent) 0%,\n ; }\n.wordmark-sm { font-size: 22px; }\n.wordmark-xs { font-size: 16px; }\n\n/* Dotless i with a 3-star belt diacritic */\n.wm-i {\n  position: relative;\n  display: inline-block;\n}\n/* Belt-flanked i: the natural i-dot stays as the middle \"Alnilam\".\n   Flanking dots must sit at the SAME baseline as that dot — otherwise the\n   three points read as a triangle (eyes-and-nose) instead of a horizontal\n   belt. In Fraunces, the i-dot sits noticeably below the top of the em-box,\n   so we use a larger `top` than naive intuition suggests. */\n.wm-i .wm-belt-l,\n.wm-i .wm-belt-r {\n  position: absolute;\n  top: 0.17em;            /* matches Fraunces i-dot vertical position */\n  left: 50%;\n  width: 0.095em;\n  height: 0.095em;\n  margin-left: -0.0475em; /* center the dot on the 50% line */\n  border-radius: 50%;\n  background: currentColor;\n  pointer-events: none;\n}\n.wm-i .wm-belt-l { transform: translateX(-0.13em); }\n.wm-i .wm-belt-r { transform: translateX( 0.13em); }\n/* Tagline lockup */\n.wm-lockup {\n  display: inline-flex;\n  flex-direction: column;\n  gap: 6px;\n  line-height: 1;\n}\n.wm-lockup .wm-tagline {\n  font-family: var(--font-body);\n  font-size: 0.13em; /* relative to wordmark */\n  letter-spacing: 0.28em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  font-weight: 500;\n  padding-left: 0.05em;\n}\n\n/* ─────────── 02 — Anatomy ─────────── */\n.anatomy {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 28px;\n  align-items: stretch;\n}\n.anatomy-stage {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: 18px;\n  min-height: 460px;\n  position: relative;\n  overflow: hidden;\n  display: grid; place-items: center;\n}\n.anatomy-stage svg.diagram { width: 100%; height: 100%; max-width: 520px; padding: 32px; }\n.anatomy-notes {\n  display: flex;\n  flex-direction: column;\n  gap: 14px;\n  justify-content: center;\n}\n.anatomy-note {\n  display: grid;\n  grid-template-columns: 36px 1fr;\n  gap: 14px;\n  align-items: flex-start;\n  padding: 16px 18px;\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: 12px;\n}\n.anatomy-note-num {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  letter-spacing: 0.08em;\n  color: var(--ember);\n  background: color-mix(in oklab, var(--ember) 12%, var(--surface));\n  border: 1px solid color-mix(in oklab, var(--ember) 22%, var(--line));\n  border-radius: 999px;\n  padding: 4px 0;\n  text-align: center;\n  font-weight: 600;\n}\n.anatomy-note-title {\n  font-family: var(--font-display);\n  font-size: 15px;\n  font-weight: 500;\n  letter-spacing: -0.01em;\n  color: var(--ink);\n}\n.anatomy-note-body {\n  font-size: 13px;\n  color: var(--ink-2);\n  line-height: 1.5;\n  margin-top: 4px;\n}\n\n/* ─────────── 03 — Mark system ─────────── */\n.mark-system {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 18px;\n}\n.mark-tier {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: 18px;\n  overflow: hidden;\n  display: flex; flex-direction: column;\n}\n.mark-tier-stage {\n  background: var(--bg);\n  display: grid; place-items: center;\n  padding: 40px 24px;\n  border-bottom: 1px solid var(--line);\n  min-height: 240px;\n  color: var(--ink);\n}\n.mark-tier-stage.dark { background: #1c1812; color: var(--star); border-bottom-color: #1c1812; }\n.mark-tier-body { padding: 20px 22px 22px; }\n.mark-tier-eyebrow {\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n}\n.mark-tier-eyebrow .tier-num { color: var(--ember); margin-right: 6px; font-weight: 600; }\n.mark-tier-name {\n  font-family: var(--font-display);\n  font-size: 20px;\n  font-weight: 400;\n  letter-spacing: -0.015em;\n  color: var(--ink);\n  margin-top: 6px;\n}\n.mark-tier-desc {\n  font-size: 13px;\n  color: var(--ink-2);\n  line-height: 1.5;\n  margin-top: 8px;\n}\n.mark-tier-range {\n  margin-top: 14px;\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  letter-spacing: 0.08em;\n  color: var(--ink);\n  background: var(--surface-2);\n  border: 1px solid var(--line);\n  padding: 3px 10px;\n  border-radius: 999px;\n}\n\n/* ─────────── 04 — Lockups ─────────── */\n.lockups {\n  display: grid;\n  grid-template-columns: repeat(12, 1fr);\n  gap: 18px;\n}\n.lockup {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: 18px;\n  padding: 36px 32px 24px;\n  position: relative;\n  display: grid; place-items: center;\n  min-height: 220px;\n}\n.lockup.l-horizontal { grid-column: span 7; }\n.lockup.l-stacked    { grid-column: span 5; }\n.lockup.l-icon       { grid-column: span 4; }\n.lockup.l-wordmark   { grid-column: span 4; }\n.lockup.l-tagline    { grid-column: span 4; }\n.lockup-label {\n  position: absolute;\n  top: 14px; left: 18px;\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n}\n\n/* Horizontal lockup */\n.lk-h { display: inline-flex; align-items: center; gap: 18px; color: var(--ink); }\n.lk-h .glyph { flex-shrink: 0; }\n\n/* Stacked lockup */\n.lk-stacked { display: inline-flex; flex-direction: column; align-items: center; gap: 14px; color: var(--ink); }\n\n/* Tagline lockup */\n.lk-tag { display: inline-flex; flex-direction: column; align-items: flex-start; gap: 4px; color: var(--ink); }\n.lk-tag .tag-rule {\n  width: 24px; height: 1px;\n  background: var(--ember);\n  margin: 6px 0 4px;\n}\n.lk-tag .tag-text {\n  font-family: var(--font-body);\n  font-size: 11px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--ink-2);\n  font-weight: 500;\n}\n\n/* ─────────── 05 — Clear space + minimum sizes ─────────── */\n.clearance {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 28px;\n}\n.clear-stage {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: 18px;\n  padding: 40px;\n  position: relative;\n  display: grid; place-items: center;\n  min-height: 340px;\n  overflow: hidden;\n}\n.clear-grid {\n  position: relative;\n  display: grid; place-items: center;\n}\n.clear-grid .glyph {\n  color: var(--ink);\n  position: relative;\n  z-index: 2;\n}\n.clear-grid::before {\n  /* x-box outline = clear space rectangle */\n  content: '';\n  position: absolute;\n  inset: -36px;\n  border: 1px dashed color-mix(in oklab, var(--ember) 50%, var(--line));\n  border-radius: 6px;\n  z-index: 1;\n}\n.clear-grid .xunit {\n  position: absolute;\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  color: var(--ember);\n  letter-spacing: 0.04em;\n  z-index: 3;\n  background: var(--surface);\n  padding: 0 4px;\n  border-radius: 3px;\n}\n.clear-grid .xunit-t { top: -44px; left: 50%; transform: translateX(-50%); }\n.clear-grid .xunit-r { right: -56px; top: 50%; transform: translateY(-50%); }\n.clear-grid .xunit-b { bottom: -44px; left: 50%; transform: translateX(-50%); }\n.clear-grid .xunit-l { left: -56px; top: 50%; transform: translateY(-50%); }\n\n.clear-explain {\n  align-self: center;\n}\n.clear-explain p {\n  font-size: 14px;\n  color: var(--ink-2);\n  line-height: 1.6;\n  margin: 0 0 12px;\n}\n.clear-explain p code {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  background: var(--surface-2);\n  padding: 1px 6px;\n  border-radius: 4px;\n  color: var(--ink);\n}\n\n/* Size ramp */\n.size-ramp {\n  display: grid;\n  grid-template-columns: repeat(6, 1fr);\n  gap: 8px;\n  margin-top: 28px;\n}\n.size-cell {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  padding: 16px 12px 12px;\n  display: flex; flex-direction: column; align-items: center; gap: 10px;\n  text-align: center;\n  position: relative;\n}\n.size-cell.bad {\n  border-color: color-mix(in oklab, var(--err) 35%, var(--line));\n  background: color-mix(in oklab, var(--err) 4%, var(--surface));\n}\n.size-cell .sz-glyph {\n  display: grid; place-items: center;\n  min-height: 56px;\n  color: var(--ink);\n}\n.size-cell .sz-px {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--ink);\n  letter-spacing: 0.06em;\n}\n.size-cell .sz-note {\n  font-size: 11px;\n  color: var(--ink-3);\n  line-height: 1.3;\n}\n.size-cell.bad .sz-note { color: var(--err); }\n.size-cell .sz-tier {\n  position: absolute;\n  top: 8px; right: 10px;\n  font-family: var(--font-mono);\n  font-size: 9.5px;\n  letter-spacing: 0.06em;\n  color: var(--ember);\n  background: color-mix(in oklab, var(--ember) 10%, var(--surface));\n  padding: 1px 6px;\n  border-radius: 999px;\n}\n.size-cell.bad .sz-tier {\n  color: var(--err);\n  background: color-mix(in oklab, var(--err) 10%, var(--surface));\n}\n\n/* ─────────── 06 — Color ─────────── */\n.color-grid {\n  display: grid;\n  grid-template-columns: repeat(6, 1fr);\n  gap: 12px;\n}\n.swatch {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  overflow: hidden;\n  display: flex; flex-direction: column;\n}\n.swatch-chip {\n  height: 88px;\n  position: relative;\n}\n.swatch-chip::after {\n  /* ring to read contrast on near-white chips */\n  content: '';\n  position: absolute; inset: 0;\n  box-shadow: inset 0 0 0 1px rgba(31,27,21,.06);\n}\n.swatch-body { padding: 12px 14px; }\n.swatch-name {\n  font-family: var(--font-display);\n  font-size: 13.5px;\n  font-weight: 500;\n  color: var(--ink);\n  letter-spacing: -0.005em;\n}\n.swatch-hex {\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  color: var(--ink-3);\n  letter-spacing: 0.06em;\n  margin-top: 2px;\n}\n.swatch-role {\n  font-size: 10.5px;\n  color: var(--ink-3);\n  margin-top: 6px;\n  line-height: 1.35;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  font-weight: 600;\n}\n\n.color-band {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 18px;\n  margin-top: 22px;\n}\n.color-pairing {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: 18px;\n  padding: 28px 28px 22px;\n  display: flex; align-items: center; gap: 22px;\n}\n.color-pairing.dark { background: #1c1812; border-color: #1c1812; color: var(--star); }\n.color-pairing.dark .cp-name { color: var(--star); }\n.color-pairing.dark .cp-desc { color: rgba(245,239,224,.7); }\n.color-pairing .glyph { flex-shrink: 0; }\n.cp-name {\n  font-family: var(--font-display);\n  font-size: 17px; font-weight: 500;\n  color: var(--ink);\n}\n.cp-desc { font-size: 13px; color: var(--ink-2); margin-top: 4px; line-height: 1.5; }\n\n/* Sub-product hues */\n.subs {\n  display: grid;\n  grid-template-columns: repeat(6, 1fr);\n  gap: 10px;\n  margin-top: 22px;\n}\n.sub-card {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  padding: 14px 14px 12px;\n}\n.sub-mark-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }\n.sub-mark-square {\n  width: 26px; height: 26px;\n  border-radius: 7px;\n  display: grid; place-items: center;\n  color: white;\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: 13px;\n}\n.sub-mark-name {\n  font-family: var(--font-display);\n  font-size: 14px; font-weight: 500;\n  color: var(--ink);\n}\n.sub-card-hex {\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  color: var(--ink-3);\n  letter-spacing: 0.04em;\n}\n\n/* ─────────── 07 — Typography ─────────── */\n.type-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n  gap: 18px;\n}\n.type-card {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: 18px;\n  padding: 28px;\n  display: flex; flex-direction: column; gap: 20px;\n}\n.type-eyebrow {\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n}\n.type-eyebrow em { color: var(--ember); font-style: normal; margin-right: 8px; }\n.type-name {\n  font-size: 36px;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n  line-height: 1;\n}\n.type-name.display { font-family: var(--font-display); font-weight: 400; }\n.type-name.body    { font-family: var(--font-body); font-weight: 500; }\n.type-name.mono    { font-family: var(--font-mono); font-weight: 500; font-size: 30px; }\n.type-spec {\n  font-size: 12px;\n  color: var(--ink-3);\n  line-height: 1.5;\n  font-family: var(--font-mono);\n  letter-spacing: 0.04em;\n}\n.type-sample {\n  border-top: 1px solid var(--line-soft);\n  padding-top: 18px;\n}\n.type-sample-row {\n  display: flex; align-items: baseline; gap: 14px;\n  padding: 6px 0;\n  border-bottom: 1px dashed var(--line-soft);\n}\n.type-sample-row:last-child { border-bottom: 0; }\n.type-sample-meta {\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  color: var(--ink-3);\n  width: 60px; flex-shrink: 0;\n}\n.type-sample-text { line-height: 1.15; color: var(--ink); }\n\n/* ─────────── 08 — In context ─────────── */\n.context-grid {\n  display: grid;\n  grid-template-columns: repeat(12, 1fr);\n  gap: 18px;\n}\n.ctx { background: var(--surface); border: 1px solid var(--line); border-radius: 18px; overflow: hidden; position: relative; }\n.ctx-label {\n  position: absolute; top: 12px; left: 16px;\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  letter-spacing: 0.14em; text-transform: uppercase;\n  color: var(--ink-3);\n  z-index: 2;\n}\n.ctx.on-dark .ctx-label {\n  color: rgba(245,239,224,.6);\n}\n.ctx-pad { padding: 50px 28px 28px; }\n\n.ctx-appicon { grid-column: span 4; }\n.ctx-appicon-stage {\n  background: linear-gradient(140deg, #1c1812 0%, #2a221a 60%, #3a2a1f 100%);\n  height: 280px;\n  display: grid; place-items: center;\n  color: var(--star);\n}\n.app-icon {\n  width: 156px; height: 156px;\n  border-radius: 36px;\n  background: var(--ink);\n  display: grid; place-items: center;\n  color: var(--star);\n  box-shadow:\n    0 1px 0 rgba(255,255,255,.08) inset,\n    0 24px 60px -16px rgba(0,0,0,.55),\n    0 8px 20px -8px rgba(0,0,0,.4);\n  position: relative;\n  overflow: hidden;\n}\n.app-icon::before {\n  content: '';\n  position: absolute; inset: 0;\n  background: radial-gradient(closest-side at 70% 18%, rgba(255,255,255,.16), transparent 60%);\n}\n\n.ctx-favicon { grid-column: span 3; }\n.ctx-favicon-stage {\n  background: var(--surface);\n  height: 280px;\n  display: grid; place-items: center;\n  padding: 32px;\n}\n.fav-browser {\n  width: 100%;\n  max-width: 260px;\n  background: var(--bg);\n  border: 1px solid var(--line);\n  border-radius: 10px;\n  overflow: hidden;\n  box-shadow: 0 8px 24px -12px rgba(31,27,21,.18);\n}\n.fav-tabs {\n  display: flex;\n  background: var(--surface-2);\n  padding: 6px 6px 0;\n  gap: 4px;\n}\n.fav-tab {\n  display: inline-flex; align-items: center; gap: 6px;\n  background: var(--bg);\n  padding: 6px 12px 6px 8px;\n  border-top-left-radius: 8px;\n  border-top-right-radius: 8px;\n  font-size: 11px;\n  color: var(--ink);\n  border: 1px solid var(--line);\n  border-bottom: 0;\n}\n.fav-tab.muted {\n  background: var(--surface-2);\n  color: var(--ink-3);\n  border-color: transparent;\n}\n.fav-tab .fav-x {\n  margin-left: 4px;\n  color: var(--ink-3);\n  font-size: 10px;\n}\n.fav-url {\n  display: flex; align-items: center; gap: 8px;\n  padding: 8px 10px;\n  background: var(--bg);\n  border-top: 1px solid var(--line);\n}\n.fav-url-pill {\n  flex: 1;\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: 999px;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--ink-3);\n  padding: 4px 10px;\n}\n\n.ctx-sidebar { grid-column: span 5; }\n.ctx-sb-stage {\n  background: linear-gradient(180deg, #1c1812 0%, #221d15 100%);\n  height: 280px;\n  display: flex;\n  padding: 0;\n}\n.sb-mock-rail {\n  width: 200px;\n  border-right: 1px solid rgba(255,255,255,.05);\n  display: flex; flex-direction: column;\n}\n.sb-mock-brand {\n  display: flex; align-items: center; gap: 10px;\n  padding: 14px 16px;\n  border-bottom: 1px solid rgba(255,255,255,.05);\n}\n.sb-mock-brand .sb-mock-mark {\n  width: 32px; height: 32px;\n  border-radius: 8px;\n  background: var(--ember);\n  color: var(--star);\n  display: grid; place-items: center;\n  box-shadow: 0 0 0 1px rgba(255,255,255,.1) inset, 0 4px 12px -4px var(--ember);\n}\n.sb-mock-brand-name {\n  font-family: var(--font-display);\n  font-size: 16px;\n  color: #f5efe0;\n  line-height: 1;\n}\n.sb-mock-brand-sub {\n  font-size: 9.5px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: rgba(245,239,224,.6);\n  margin-top: 4px;\n  font-weight: 600;\n}\n.sb-mock-items {\n  flex: 1;\n  padding: 10px 8px;\n  display: flex; flex-direction: column; gap: 2px;\n}\n.sb-mock-item {\n  display: flex; align-items: center; gap: 8px;\n  padding: 7px 8px;\n  font-size: 12.5px;\n  color: rgba(217,210,194,.85);\n  border-radius: 5px;\n}\n.sb-mock-item.on {\n  background: rgba(255,255,255,.06);\n  color: #f5efe0;\n}\n.sb-mock-item .dot {\n  width: 6px; height: 6px; border-radius: 2px;\n  background: var(--dot, currentColor);\n  opacity: 0.7;\n}\n.sb-mock-canvas {\n  flex: 1;\n  background: var(--bg);\n  padding: 18px;\n  position: relative;\n}\n.sb-mock-canvas-bar {\n  height: 8px;\n  width: 60%;\n  background: var(--surface-2);\n  border-radius: 4px;\n}\n.sb-mock-canvas-bar.short { width: 30%; margin-top: 8px; }\n.sb-mock-canvas-grid {\n  margin-top: 16px;\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n  gap: 8px;\n}\n.sb-mock-tile {\n  height: 36px;\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: 8px;\n}\n\n.ctx-card { grid-column: span 6; }\n.ctx-card-stage {\n  background: linear-gradient(140deg, #efe9dd 0%, #f5f0e8 100%);\n  height: 280px;\n  display: grid; place-items: center;\n  padding: 28px;\n}\n.bcard {\n  width: 320px; height: 190px;\n  background: var(--surface);\n  border-radius: 12px;\n  box-shadow: 0 18px 40px -14px rgba(31,27,21,.28), 0 4px 12px -4px rgba(31,27,21,.12);\n  padding: 22px 22px 18px;\n  position: relative;\n  overflow: hidden;\n  display: flex; flex-direction: column; justify-content: space-between;\n  color: var(--ink);\n  transform: rotate(-3deg);\n}\n.bcard::before {\n  /* a small constellation watermark in the corner */\n  content: '';\n  position: absolute;\n  top: -40px; right: -40px;\n  width: 220px; height: 220px;\n  background: radial-gradient(closest-side at 50% 50%, color-mix(in oklab, var(--ember) 8%, transparent), transparent 70%);\n  pointer-events: none;\n}\n.bcard-meta {\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.16em;\n  color: var(--ink-3);\n  text-transform: uppercase;\n}\n.bcard-name {\n  font-family: var(--font-display);\n  font-size: 15px;\n  font-weight: 500;\n  letter-spacing: -0.01em;\n  margin-top: 2px;\n  color: var(--ink);\n}\n.bcard-role {\n  font-size: 11px;\n  color: var(--ink-3);\n  margin-top: 2px;\n  letter-spacing: 0.02em;\n}\n\n.ctx-label-tag { grid-column: span 6; }\n.ctx-label-stage {\n  background: linear-gradient(135deg, #f5f0e8 0%, #e6dcc4 100%);\n  height: 280px;\n  display: grid; place-items: center;\n  padding: 28px;\n}\n.care-label {\n  width: 220px;\n  background: #fbf8f2;\n  border-radius: 6px;\n  padding: 18px 16px 16px;\n  box-shadow: 0 6px 18px -8px rgba(31,27,21,.25), inset 0 0 0 1px rgba(31,27,21,.06);\n  position: relative;\n  transform: rotate(2deg);\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  color: var(--ink-2);\n  letter-spacing: 0.06em;\n}\n.care-label .care-mark {\n  display: grid; place-items: center;\n  color: var(--ink);\n  margin-bottom: 10px;\n}\n.care-label .care-rule {\n  height: 1px; background: var(--line);\n  margin: 8px 0;\n}\n.care-label .care-row {\n  display: flex; justify-content: space-between;\n  padding: 2px 0;\n}\n.care-label .care-foot {\n  text-align: center;\n  margin-top: 10px;\n  font-size: 9px;\n  letter-spacing: 0.18em;\n  color: var(--ink-3);\n}\n\n/* ─────────── 09 — Don'ts ─────────── */\n.donts {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 14px;\n}\n.dont {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: 14px;\n  padding: 22px 18px 18px;\n  position: relative;\n  min-height: 200px;\n  display: flex; flex-direction: column;\n}\n.dont-stage {\n  flex: 1;\n  display: grid; place-items: center;\n  background: var(--bg);\n  border-radius: 8px;\n  padding: 18px 12px;\n  margin-bottom: 12px;\n  position: relative;\n  overflow: hidden;\n  color: var(--ink);\n}\n.dont-x {\n  position: absolute;\n  top: 10px; right: 10px;\n  width: 22px; height: 22px;\n  border-radius: 999px;\n  background: var(--err);\n  color: white;\n  display: grid; place-items: center;\n  font-size: 12px;\n  font-weight: 600;\n  box-shadow: 0 0 0 3px var(--surface);\n}\n.dont-text {\n  font-size: 12.5px;\n  color: var(--ink-2);\n  line-height: 1.5;\n}\n.dont-text strong { color: var(--ink); font-weight: 600; }\n\n/* skewed dont */\n.dont-skew .glyph { transform: skewX(-12deg) scale(1.05); }\n/* stretched */\n.dont-stretch .glyph { transform: scaleX(1.4); }\n/* rainbow */\n.dont-rainbow .glyph {\n  background: conic-gradient(from 180deg, #ef4444, #eab308, #22c55e, #06b6d4, #6366f1, #ef4444);\n  -webkit-background-clip: text; background-clip: text;\n  color: transparent;\n}\n.dont-rainbow .glyph svg * { stroke: url(#dont-rainbow-stroke); fill: url(#dont-rainbow-stroke); }\n/* low contrast */\n.dont-contrast {\n  background: #2c2820;\n}\n.dont-contrast .dont-stage { background: #3a352a; }\n.dont-contrast .dont-stage .glyph { color: #4a4337; }\n.dont-contrast .dont-text { color: rgba(245,239,224,.55); }\n.dont-contrast .dont-text strong { color: #f5efe0; }\n/* rotated */\n.dont-rotate .glyph { transform: rotate(-22deg); }\n/* belt only */\n.dont-recolor .glyph { color: #22c55e; }\n/* shadow effect */\n.dont-shadow .glyph { filter: drop-shadow(0 0 10px rgba(168,50,39,.95)); }\n.dont-shadow .glyph svg { color: var(--ember); }\n/* mismatched font */\n.dont-font .wordmark { font-family: \"Comic Sans MS\", \"Comic Sans\", system-ui, sans-serif !important; font-weight: 700; }\n\n/* ─────────── Footer ─────────── */\n.bs-foot {\n  margin-top: 96px;\n  padding-top: 24px;\n  border-top: 1px solid var(--line);\n  display: flex; justify-content: space-between; align-items: center;\n  flex-wrap: wrap; gap: 12px;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--ink-3);\n  letter-spacing: 0.08em;\n}\n\n/* Responsive shrink */\n@media (max-width: 1100px) {\n  .bs-shell { padding: 40px 32px 80px; }\n  .hero { grid-template-columns: 1fr; }\n  .hero-side { flex-direction: row; }\n  .hero-side-card { flex: 1; }\n  .mark-system { grid-template-columns: 1fr; }\n  .anatomy { grid-template-columns: 1fr; }\n  .lockup.l-horizontal, .lockup.l-stacked,\n  .lockup.l-icon, .lockup.l-wordmark, .lockup.l-tagline { grid-column: span 12; }\n  .clearance { grid-template-columns: 1fr; }\n  .size-ramp { grid-template-columns: repeat(3, 1fr); }\n  .color-grid { grid-template-columns: repeat(3, 1fr); }\n  .subs { grid-template-columns: repeat(3, 1fr); }\n  .type-grid { grid-template-columns: 1fr; }\n  .ctx-appicon, .ctx-favicon, .ctx-sidebar, .ctx-card, .ctx-label-tag { grid-column: span 12; }\n  .donts { grid-template-columns: 1fr 1fr; }\n}\n\n/* ─────────── Belt loader (animated 3-dot indicator) ─────────── */\n/* The belt-of-Orion pulses dot-by-dot, left-to-right.\n   Doubles as the brand's loading state and as the soul of the wordmark. */\n.belt-loader { display: inline-block; color: currentColor; }\n.belt-loader circle {\n  transform-origin: center;\n  transform-box: fill-box;\n  animation: belt-pulse 1.4s ease-in-out infinite;\n  will-change: transform, opacity;\n}\n.belt-loader circle:nth-child(1) { animation-delay: 0s; }\n.belt-loader circle:nth-child(2) { animation-delay: 0.18s; }\n.belt-loader circle:nth-child(3) { animation-delay: 0.36s; }\n@keyframes belt-pulse {\n  0%, 70%, 100% { opacity: 0.28; transform: scale(0.7); }\n  35% { opacity: 1; transform: scale(1.05); }\n}\n@media (prefers-reduced-motion: reduce) {\n  .belt-loader circle { animation: none; opacity: 1; transform: none; }\n}\n\n/* Sub-product card — add a small Lucide icon next to the colored mark */\n.sub-mark-row { gap: 10px; }\n.sub-card-meta { display: flex; align-items: center; gap: 6px; margin-top: 6px; }\n.sub-card-icon {\n  width: 14px; height: 14px;\n  color: var(--ink-3);\n  display: inline-flex; align-items: center;\n}\n.sub-card-icon-name {\n  font-size: 11px;\n  color: var(--ink-3);\n  letter-spacing: 0.02em;\n}\n\n/* ─────────── New application stages (loading splash, share card) ─────────── */\n.ctx-splash { grid-column: span 6; }\n.ctx-splash-stage {\n  background: linear-gradient(180deg, #1c1812 0%, #2a221a 100%);\n  height: 280px;\n  display: grid;\n  place-items: center;\n  color: var(--star);\n  padding: 28px;\n  position: relative;\n}\n.splash-inner {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 24px;\n}\n.splash-inner .wordmark {\n  color: var(--star);\n}\n.splash-loader-wrap {\n  display: flex; align-items: center; gap: 14px;\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: rgba(245,239,224,.55);\n}\n\n.ctx-share { grid-column: span 6; }\n.ctx-share-stage {\n  background: var(--bg);\n  height: 280px;\n  display: grid;\n  place-items: center;\n  padding: 24px;\n}\n.share-card {\n  width: 100%;\n  max-width: 460px;\n  aspect-ratio: 1200 / 630;\n  background: linear-gradient(135deg, #1c1812 0%, #2a221a 70%);\n  border-radius: 14px;\n  padding: 28px 30px;\n  display: flex;\n  flex-direction: column;\n  justify-content: space-between;\n  color: var(--star);\n  position: relative;\n  overflow: hidden;\n  box-shadow: 0 18px 40px -16px rgba(31,27,21,.4);\n}\n.share-card::after {\n  /* Ember glow in the bottom-right corner */\n  content: '';\n  position: absolute;\n  right: -80px; bottom: -80px;\n  width: 260px; height: 260px;\n  background: radial-gradient(closest-side, color-mix(in oklab, var(--ember) 50%, transparent), transparent 70%);\n  pointer-events: none;\n}\n.share-card-top {\n  display: flex; align-items: center; gap: 12px;\n  position: relative; z-index: 1;\n}\n.share-card-eyebrow {\n  font-family: var(--font-mono);\n  font-size: 9.5px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: rgba(245,239,224,.55);\n}\n.share-card-title {\n  font-family: var(--font-display);\n  font-size: 26px;\n  font-weight: 400;\n  letter-spacing: -0.022em;\n  line-height: 1.05;\n  color: var(--star);\n  position: relative; z-index: 1;\n  max-width: 80%;\n}\n.share-card-title em {\n  font-style: italic;\n  color: color-mix(in oklab, var(--ember) 60%, var(--star));\n}\n\n/* Lucide replacement — make icons inherit currentColor + size */\n[data-lucide] svg,\ni.lucide-loaded svg { display: block; }\n\n@media (max-width: 1100px) {\n  .ctx-splash, .ctx-share { grid-column: span 12; }\n}\n<\u002Fstyle>\n<script src=\"8ec29a5b-251f-476d-8dac-fc879022246b\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ═════════ Shared SVG glyph definitions ═════════ -->\n<svg xmlns=\"http://www.w3.org/2000/svg\" style=\"position: absolute; width: 0; height: 0; overflow: hidden;\" aria-hidden=\"true\">\n  <defs>\n\n    <!-- Display mark: full constellation t-shirt (for large display).\n         Stroke width is THICKER than the original login mark so connecting lines\n         survive at 56-96px display sizes. -->\n    <symbol id=\"orion-display\" viewBox=\"0 0 100 105\">\n      <!-- soft halo bg behind constellation -->\n      <radialGradient id=\"orion-disp-glow\" cx=\"50%\" cy=\"55%\" r=\"55%\">\n        <stop offset=\"0%\" stop-color=\"currentColor\" stop-opacity=\"0.08\"><\u002Fstop>\n        <stop offset=\"100%\" stop-color=\"currentColor\" stop-opacity=\"0\"><\u002Fstop>\n      <\u002FradialGradient>\n      <circle cx=\"50\" cy=\"55\" r=\"50\" fill=\"url(#orion-disp-glow)\"><\u002Fcircle>\n\n      <!-- T-shirt outline traced through the 11 corner stars.\n           Order: collar-l → shoulder-l → sleeve-l → armpit-l → hem-l →\n           hem-r → armpit-r → sleeve-r → shoulder-r → collar-r → neckline → collar-l -->\n      <polyline points=\"42,20 23,25 12,43 32,41 28,86 72,86 68,41 88,43 77,25 58,20 50,26 42,20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"0.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\" opacity=\"0.5\"><\u002Fpolyline>\n\n      <!-- Orion's belt — chest emblem -->\n      <polyline points=\"40,56 50,58 60,56\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.1\" stroke-linecap=\"round\" opacity=\"0.7\"><\u002Fpolyline>\n\n      <!-- Outline stars (halo + dot, both bigger than login version) -->\n      <g fill=\"currentColor\">\n        <circle cx=\"42\" cy=\"20\" r=\"4.4\" opacity=\"0.10\"><\u002Fcircle><circle cx=\"42\" cy=\"20\" r=\"2.4\"><\u002Fcircle>\n        <circle cx=\"23\" cy=\"25\" r=\"5.4\" opacity=\"0.10\"><\u002Fcircle><circle cx=\"23\" cy=\"25\" r=\"2.9\"><\u002Fcircle>\n        <circle cx=\"12\" cy=\"43\" r=\"3.8\" opacity=\"0.10\"><\u002Fcircle><circle cx=\"12\" cy=\"43\" r=\"2.0\"><\u002Fcircle>\n        <circle cx=\"32\" cy=\"41\" r=\"3.2\" opacity=\"0.10\"><\u002Fcircle><circle cx=\"32\" cy=\"41\" r=\"1.7\"><\u002Fcircle>\n        <circle cx=\"28\" cy=\"86\" r=\"5.4\" opacity=\"0.10\"><\u002Fcircle><circle cx=\"28\" cy=\"86\" r=\"2.9\"><\u002Fcircle>\n        <circle cx=\"72\" cy=\"86\" r=\"5.4\" opacity=\"0.10\"><\u002Fcircle><circle cx=\"72\" cy=\"86\" r=\"2.9\"><\u002Fcircle>\n        <circle cx=\"68\" cy=\"41\" r=\"3.2\" opacity=\"0.10\"><\u002Fcircle><circle cx=\"68\" cy=\"41\" r=\"1.7\"><\u002Fcircle>\n        <circle cx=\"88\" cy=\"43\" r=\"3.8\" opacity=\"0.10\"><\u002Fcircle><circle cx=\"88\" cy=\"43\" r=\"2.0\"><\u002Fcircle>\n        <circle cx=\"77\" cy=\"25\" r=\"5.4\" opacity=\"0.10\"><\u002Fcircle><circle cx=\"77\" cy=\"25\" r=\"2.9\"><\u002Fcircle>\n        <circle cx=\"58\" cy=\"20\" r=\"4.4\" opacity=\"0.10\"><\u002Fcircle><circle cx=\"58\" cy=\"20\" r=\"2.4\"><\u002Fcircle>\n        <circle cx=\"50\" cy=\"26\" r=\"2.8\" opacity=\"0.10\"><\u002Fcircle><circle cx=\"50\" cy=\"26\" r=\"1.5\"><\u002Fcircle>\n      <\u002Fg>\n\n      <!-- Belt stars — emphasized: bigger halos and core highlight -->\n      <g>\n        <circle cx=\"40\" cy=\"56\" r=\"5.4\" fill=\"currentColor\" opacity=\"0.10\"><\u002Fcircle>\n        <circle cx=\"50\" cy=\"58\" r=\"6.2\" fill=\"currentColor\" opacity=\"0.10\"><\u002Fcircle>\n        <circle cx=\"60\" cy=\"56\" r=\"5.4\" fill=\"currentColor\" opacity=\"0.10\"><\u002Fcircle>\n        <circle cx=\"40\" cy=\"56\" r=\"2.4\" fill=\"currentColor\"><\u002Fcircle>\n        <circle cx=\"50\" cy=\"58\" r=\"2.7\" fill=\"currentColor\"><\u002Fcircle>\n        <circle cx=\"60\" cy=\"56\" r=\"2.4\" fill=\"currentColor\"><\u002Fcircle>\n      <\u002Fg>\n    <\u002Fsymbol>\n\n    <!-- App-icon mark: solid filled t-shirt silhouette with 3 belt stars cut out (white-on-dark).\n         Designed to survive at 16-48px because there are no fine strokes — only a single shape\n         and three clear punched circles for the belt. -->\n    <symbol id=\"orion-solid\" viewBox=\"0 0 100 105\">\n      <!-- T-shirt silhouette as a single path. Cutouts for collar + belt stars use evenodd. -->\n      <path fill-rule=\"evenodd\" fill=\"currentColor\" d=\"M 42 16\n               C 38 18, 28 19, 22 22\n               L 9 41\n               C 8.5 42.5, 9 44, 10.5 44.5\n               L 26 49\n               L 22 88\n               C 21.8 90, 23.5 92, 25.5 92\n               L 74.5 92\n               C 76.5 92, 78.2 90, 78 88\n               L 74 49\n               L 89.5 44.5\n               C 91 44, 91.5 42.5, 91 41\n               L 78 22\n               C 72 19, 62 18, 58 16\n               C 56.5 22, 53.5 28, 50 28\n               C 46.5 28, 43.5 22, 42 16\n               Z\n               M 40 56 m -3.6 0 a 3.6 3.6 0 1 0 7
